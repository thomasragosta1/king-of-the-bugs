<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>King of the Bugs</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0810;}
body{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;}

#game-wrap{
  position:relative;
  flex-shrink:0;
}
#c{
  display:block;
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  border:3px solid #222;
  box-shadow:0 0 24px #000c;
}

/* ── ON-SCREEN CONTROLLER ── */
#ctrl{
  position:absolute;
  bottom:0;left:0;right:0;
  height:140px;
  display:none; /* shown only on touch */
  pointer-events:none;
  user-select:none;
}
#ctrl.visible{display:flex;}

/* D-pad cluster (left) */
#dpad{
  position:absolute;
  left:20px; bottom:14px;
  width:120px; height:120px;
  pointer-events:all;
}
.dpbtn{
  position:absolute;
  background:rgba(255,255,255,0.18);
  border:2px solid rgba(255,255,255,0.35);
  border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;color:rgba(255,255,255,0.7);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.05s;
}
.dpbtn:active,.dpbtn.pressed{background:rgba(255,255,255,0.4);}
#dp-up   {top:0;    left:40px; width:40px;height:40px;}
#dp-down {bottom:0; left:40px; width:40px;height:40px;}
#dp-left {top:40px; left:0;    width:40px;height:40px;}
#dp-right{top:40px; left:80px; width:40px;height:40px;}
#dp-center{top:40px;left:40px; width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.08);}

/* Action buttons (right) */
#abtn{
  position:absolute;
  right:20px; bottom:14px;
  width:120px; height:120px;
  pointer-events:all;
}
.abtn{
  position:absolute;
  width:44px;height:44px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:bold;color:rgba(255,255,255,0.85);
  cursor:pointer;
  font-family:monospace;
  -webkit-tap-highlight-color:transparent;
  transition:background 0.05s;
}
.abtn:active,.abtn.pressed{filter:brightness(1.4);}
#btn-a{right:0;top:38px;background:rgba(200,30,30,0.7);}   /* A = confirm/interact */
#btn-b{right:50px;bottom:0;background:rgba(30,30,200,0.5);} /* B = back/run        */
#btn-start{right:52px;top:0;background:rgba(80,80,80,0.6);width:36px;height:22px;border-radius:10px;font-size:9px;}

/* Select / Menu button center */
#btn-menu{
  position:absolute;
  left:50%;bottom:18px;
  transform:translateX(-50%);
  background:rgba(60,60,80,0.7);
  border:2px solid rgba(255,255,255,0.3);
  border-radius:10px;
  padding:4px 14px;
  color:rgba(255,255,255,0.7);
  font-size:10px;font-family:monospace;
  cursor:pointer;pointer-events:all;
  -webkit-tap-highlight-color:transparent;
}

#hint-bar{
  color:#444;font-size:10px;font-family:monospace;
  padding:4px 0 2px;text-align:center;width:100%;
  flex-shrink:0;
}
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="c" width="480" height="432"></canvas>

  <!-- On-screen controller -->
  <div id="ctrl">
    <div id="dpad">
      <div class="dpbtn" id="dp-up">▲</div>
      <div class="dpbtn" id="dp-down">▼</div>
      <div class="dpbtn" id="dp-left">◀</div>
      <div class="dpbtn" id="dp-right">▶</div>
      <div id="dp-center"></div>
    </div>
    <div id="btn-menu">MENU</div>
    <div id="abtn">
      <div class="abtn" id="btn-start">START</div>
      <div class="abtn" id="btn-a">A</div>
      <div class="abtn" id="btn-b">B</div>
    </div>
  </div>
</div>
<div id="hint-bar">Arrows/WASD · Enter=menu · Z=interact</div>

<script>
// ═══════════════════════════════════════════════
// SCALING + TOUCH DETECTION
// ═══════════════════════════════════════════════
const C=document.getElementById('c');
const X=C.getContext('2d');
X.imageSmoothingEnabled=false;

const GAME_W=480,GAME_H=432;
const ctrl=document.getElementById('ctrl');
const hintBar=document.getElementById('hint-bar');
let isTouchDevice=false;
let CTRL_H=0; // height of controller bar when visible

function detectTouch(){
  isTouchDevice=('ontouchstart' in window)||navigator.maxTouchPoints>0;
  if(isTouchDevice){
    ctrl.classList.add('visible');
    CTRL_H=140;
    hintBar.style.display='none';
  }
}
detectTouch();
window.addEventListener('touchstart',()=>{
  if(!isTouchDevice){isTouchDevice=true;ctrl.classList.add('visible');CTRL_H=140;hintBar.style.display='none';resize();}
},{once:true,passive:true});

function resize(){
  const availW=window.innerWidth;
  const availH=window.innerHeight-(isTouchDevice?0:20);
  const ctrlH=isTouchDevice?CTRL_H:0;
  const maxGameH=availH-ctrlH;
  const scale=Math.min(availW/GAME_W, maxGameH/GAME_H);
  const cw=Math.floor(GAME_W*scale);
  const ch=Math.floor(GAME_H*scale);
  C.style.width=cw+'px';
  C.style.height=ch+'px';
  const wrap=document.getElementById('game-wrap');
  wrap.style.width=cw+'px';
  wrap.style.height=(ch+(isTouchDevice?CTRL_H:0))+'px';
  if(isTouchDevice){
    ctrl.style.width=cw+'px';
    ctrl.style.top=ch+'px';
  }
}
resize();
window.addEventListener('resize',resize);

// ═══════════════════════════════════════════════

// ═══════════════════════════════════════════════
const PF=new FontFace('PF','url(https://fonts.gstatic.com/s/pressstart2p/v15/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2)');

PF.load().then(f=>{document.fonts.add(f);fontReady=true;}).catch(()=>fontReady=true);

// G.bugHP stores current HP for each caught bug id
function makeBug(id){
  const b=BUGS[id];
  const hp=G.bugHP&&G.bugHP[id]!==undefined?G.bugHP[id]:b.hp;
  return{id,hp,maxHp:b.hp,atk:b.atk,def:b.def,spd:b.spd,moves:[...b.moves],db:0,sb:0,ev:0};
}
function dn(bug){return G.caught[bug.id]||BUGS[bug.id].name;}
function buildBattleParty(){return G.loadout.slice(0,6).map(id=>makeBug(id));}
function saveBattleHP(){
  // Save current HP from battleParty back to persistent store
  if(!G.bugHP) G.bugHP={};
  G.battleParty.forEach(b=>{G.bugHP[b.id]=b.hp;});
}

// ── PLAYER SPRITE ──────────────────────────────
// Full 4-direction walk cycle, 4 frames per direction
// dir: 0=up 1=right 2=down 3=left
// fr: walk frame counter (mod 4 gives frame 0-3)
function drawPlayer(ctx,px,py,dir,fr,inWater=false){
  const wf=Math.floor(fr/2)%4; // 0,1,2,3 → still, left, still, right
  const x=px, y=py;

  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(x-6,y+8,12,3);

  // ── Legs / Waders ──
  if(inWater){
    // FULL wader suit - bright green, covers entire body from feet to chest
    // Wader boots
    ctx.fillStyle='#3a8830';ctx.fillRect(x-6,y+10,5,4);ctx.fillRect(x+1,y+10,5,4);
    // Wader legs
    ctx.fillStyle='#5ab848';
    const wf2=Math.floor(fr/2)%4;
    if(dir===0||dir===2){
      if(wf2===0||wf2===2){ctx.fillRect(x-4,y+2,4,9);ctx.fillRect(x,y+2,4,9);}
      else if(wf2===1){ctx.fillRect(x-4,y,4,11);ctx.fillRect(x,y+4,4,7);}
      else{ctx.fillRect(x-4,y+4,4,7);ctx.fillRect(x,y,4,11);}
    } else {
      if(wf2===0||wf2===2){ctx.fillRect(x-3,y+2,7,9);}
      else if(wf2===1){ctx.fillRect(x-4,y,4,11);ctx.fillRect(x+1,y+4,4,7);}
      else{ctx.fillRect(x-4,y+4,4,7);ctx.fillRect(x+1,y,4,11);}
    }
    // Wader bib / chest piece covers the jacket
    ctx.fillStyle='#4aac3c';ctx.fillRect(x-6,y-12,12,14);
    ctx.fillStyle='#5ab848';ctx.fillRect(x-5,y-11,10,12);
    // Wader suspender straps
    ctx.fillStyle='#3a9030';ctx.fillRect(x-4,y-12,3,14);ctx.fillRect(x+1,y-12,3,14);
    // Highlight on wader chest
    ctx.fillStyle='rgba(200,255,180,0.3)';ctx.fillRect(x-3,y-10,5,6);
    // Water surface line across legs
    ctx.fillStyle='rgba(40,100,200,0.40)';ctx.fillRect(x-8,y+3,16,4);
    ctx.fillStyle='rgba(80,160,220,0.25)';ctx.fillRect(x-7,y+5,14,3);
    // Head (same as normal - no red cap, wearing a green/khaki hat instead)
    ctx.fillStyle='#f8c88a';ctx.fillRect(x-5,y-21,10,9);
    ctx.fillStyle='#e8b87a';ctx.fillRect(x-6,y-19,2,5);ctx.fillRect(x+4,y-19,2,5);
    ctx.fillStyle='#1a1010';
    if(dir===2){ctx.fillRect(x-3,y-17,2,2);ctx.fillRect(x+1,y-17,2,2);}
    else if(dir===3)ctx.fillRect(x-4,y-17,2,2);
    else if(dir===1)ctx.fillRect(x+2,y-17,2,2);
    ctx.fillStyle='#1a1010';ctx.fillRect(x-5,y-23,10,6);ctx.fillRect(x-6,y-21,2,5);ctx.fillRect(x+4,y-21,2,5);
    // Khaki/green field hat (not red)
    ctx.fillStyle='#6a8040';ctx.fillRect(x-6,y-25,12,6);ctx.fillRect(x-7,y-24,14,3);
    ctx.fillStyle='rgba(255,255,200,0.3)';ctx.fillRect(x-3,y-25,5,3);
    ctx.restore();
    return; // skip rest of normal sprite
  } else {
    // Blue pants with per-frame animation
    ctx.fillStyle='#2a3f8a';
    if(dir===0){ // walking up - legs hidden behind body, just show feet
      ctx.fillRect(x-4,y+2,4,9); ctx.fillRect(x,y+2,4,9);
      if(wf===1){ctx.fillRect(x-4,y,4,3);} // left foot forward
      if(wf===3){ctx.fillRect(x,y,4,3);}   // right foot forward
    } else if(dir===2){ // walking down - full leg visibility
      if(wf===0||wf===2){ ctx.fillRect(x-4,y+2,4,9); ctx.fillRect(x,y+2,4,9); }
      else if(wf===1){ ctx.fillRect(x-4,y,4,11); ctx.fillRect(x,y+4,4,7); }
      else            { ctx.fillRect(x-4,y+4,4,7); ctx.fillRect(x,y,4,11); }
    } else if(dir===1){ // right
      if(wf===0||wf===2){ ctx.fillRect(x-3,y+2,7,9); }
      else if(wf===1){ ctx.fillRect(x-4,y,4,11); ctx.fillRect(x+1,y+4,4,7); }
      else            { ctx.fillRect(x-4,y+4,4,7); ctx.fillRect(x+1,y,4,11); }
    } else { // left
      if(wf===0||wf===2){ ctx.fillRect(x-3,y+2,7,9); }
      else if(wf===1){ ctx.fillRect(x,y,4,11); ctx.fillRect(x-4,y+4,4,7); }
      else            { ctx.fillRect(x,y+4,4,7); ctx.fillRect(x-4,y,4,11); }
    }
    // Shoes
    ctx.fillStyle='#111';
    ctx.fillRect(x-5,y+10,5,3); ctx.fillRect(x+1,y+10,4,3);
  }

  // ── Body (red jacket) ──
  ctx.fillStyle='#c02828'; ctx.fillRect(x-6,y-12,12,14);
  // White collar
  ctx.fillStyle='#f0f0f0'; ctx.fillRect(x-5,y-12,10,3);
  // Center stripe
  ctx.fillStyle='#e0e0e0'; ctx.fillRect(x-1,y-9,2,10);
  // Arm swing based on direction+frame
  ctx.fillStyle='#c02828';
  if(dir===1||dir===3){
    const aOff=(wf===1)?-3:(wf===3)?3:0;
    ctx.fillRect(x+5,y-10+aOff,4,8);   // right arm
    ctx.fillRect(x-8,y-10-aOff,4,8);   // left arm
    // Hands
    ctx.fillStyle='#f8c88a';
    ctx.fillRect(x+5,y-3+aOff,4,3);
    ctx.fillRect(x-8,y-3-aOff,4,3);
  } else {
    ctx.fillRect(x+5,y-10,4,8);
    ctx.fillRect(x-8,y-10,4,8);
    ctx.fillStyle='#f8c88a';
    ctx.fillRect(x+5,y-3,4,3);
    ctx.fillRect(x-8,y-3,4,3);
  }
  // Backpack
  ctx.fillStyle='#8a5828'; ctx.fillRect(x+5,y-10,5,11);
  ctx.fillStyle='#6a3810'; ctx.fillRect(x+6,y-8,3,8);

  // ── Head ──
  ctx.fillStyle='#f8c88a'; ctx.fillRect(x-5,y-21,10,9);
  // Ears
  ctx.fillStyle='#e8b87a'; ctx.fillRect(x-6,y-19,2,5); ctx.fillRect(x+4,y-19,2,5);

  // Eyes per direction
  ctx.fillStyle='#1a1010';
  if(dir===2){
    // Down - two eyes visible
    ctx.fillRect(x-3,y-17,2,2); ctx.fillRect(x+1,y-17,2,2);
    // Nose
    ctx.fillStyle='#c8906a'; ctx.fillRect(x-1,y-14,2,1);
    // Mouth
    ctx.fillStyle='#1a1010'; ctx.fillRect(x-2,y-12,4,1);
  } else if(dir===0){
    // Up - back of head, no face
    // Draw ear bumps only
  } else if(dir===3){
    // Left profile - one eye
    ctx.fillRect(x-4,y-17,2,2);
    ctx.fillStyle='#c8906a'; ctx.fillRect(x-4,y-14,2,1);
  } else {
    // Right profile - one eye
    ctx.fillRect(x+2,y-17,2,2);
    ctx.fillStyle='#c8906a'; ctx.fillRect(x+2,y-14,2,1);
  }

  // ── Hair ──
  ctx.fillStyle='#1a1010';
  ctx.fillRect(x-5,y-23,10,6);
  ctx.fillRect(x-6,y-21,2,5); ctx.fillRect(x+4,y-21,2,5);
  // Side hair tuft
  if(dir===3){ ctx.fillRect(x-6,y-21,3,6); }
  if(dir===1){ ctx.fillRect(x+3,y-21,3,6); }

  // ── Red cap ──
  ctx.fillStyle='#cc2020';
  ctx.fillRect(x-6,y-25,12,6);
  ctx.fillRect(x-7,y-24,14,3); // brim
  // Cap highlight
  ctx.fillStyle='rgba(255,255,255,0.35)'; ctx.fillRect(x-3,y-25,5,3);
  // White panel
  ctx.fillStyle='#eeeedd'; ctx.fillRect(x-2,y-25,4,4);
  // Brim direction extension
  if(dir===2||dir===1){ ctx.fillStyle='#cc2020'; ctx.fillRect(x+5,y-24,4,2); }
  if(dir===2||dir===3){ ctx.fillStyle='#cc2020'; ctx.fillRect(x-8,y-24,4,2); }

  ctx.restore();
}

// TEXT + UI
// ═══════════════════════════════════════════════
function T(str,x,y,sz=8,col='#303848',align='left'){
  X.save();
  X.font=fontReady?`${sz}px PF`:`bold ${Math.ceil(sz*1.5)}px monospace`;
  X.fillStyle=col;X.textAlign=align;X.textBaseline='alphabetic';
  X.fillText(String(str),x,y);X.restore();
}
function panel(x,y,w,h,bg='#f0ece0'){
  X.fillStyle='#303848';X.fillRect(x,y,w,h);
  X.fillStyle=bg;X.fillRect(x+3,y+3,w-6,h-6);
}
function BTN(x,y,w,h,lbl,action,sel=false,dim=false){
  const key=lbl+'|'+x+'|'+y;
  const hov=G.hovered===key;
  X.fillStyle='#303848';X.fillRect(x,y,w,h);
  const bg=dim?'#b0a890':sel?'#6890f0':hov?'#ccc4b4':'#e8e0d0';
  X.fillStyle=bg;X.fillRect(x+2,y+2,w-4,h-4);
  if(!dim){X.fillStyle=sel?'#a8c8ff':hov?'#ddd8c8':'#f4ece0';X.fillRect(x+2,y+2,w-4,3);X.fillRect(x+2,y+2,3,h-4);}
  const fsz=Math.min(8,Math.max(5,Math.floor(w/Math.max(lbl.length,1)*0.82)));
  T(lbl,x+w/2,y+h/2+Math.min(fsz,8)*0.42,Math.min(fsz,8),dim?'#807060':sel?'#f8f8e8':'#303848','center');
  if(!dim&&action)G.buttons.push({x,y,w,h,label:key,action});
}
function HPBAR(x,y,w,cur,max){
  const p=Math.max(0,cur/max);
  X.fillStyle='#303848';X.fillRect(x-1,y-1,w+2,8);
  X.fillStyle='#181820';X.fillRect(x,y,w,6);
  X.fillStyle=p>.5?'#58d838':p>.25?'#f8d820':'#f83830';
  X.fillRect(x,y,Math.max(0,(w*p)|0),6);
}

// MAPS
// zone 1,2,3 = outdoor; 'pc' = pokemon center interior
// Tile codes: 0=floor 1=grass 2=wall/tree 3=unused
// 4=path 5=PCbuilding(solid) 6=portal 7=pond 9=shrooms
// 11=PCdoor(enter) 12=PCexit 13=PCdesk 14=PCfloor 15=PCcounter
// ═══════════════════════════════════════════════
const TW=16,TALL=27,WIDE=30;
const MAPS={};

function buildMap(z){
  const m=Array.from({length:TALL},()=>new Uint8Array(WIDE));
  for(let x=0;x<WIDE;x++){m[0][x]=2;m[TALL-1][x]=2;}
  for(let y=0;y<TALL;y++){m[y][0]=2;m[y][WIDE-1]=2;}

  if(z===1){
    // 2-tile thick tree border around entire perimeter
    for(let y=0;y<TALL;y++) for(let x=0;x<WIDE;x++){
      if(y<2||y>=TALL-2||x<2||x>=WIDE-2) m[y][x]=2;
    }
    // Open green floor in the middle
    for(let y=2;y<TALL-2;y++) for(let x=2;x<WIDE-2;x++) m[y][x]=0;
    // Grass encounter patches (left and right of center path)
    for(let y=14;y<TALL-3;y++) for(let x=4;x<=12;x++) m[y][x]=1;
    for(let y=14;y<TALL-3;y++) for(let x=17;x<=24;x++) m[y][x]=1;
    // Pokemon Center building: rows 4-10, cols 11-18
    for(let cy=4;cy<=10;cy++) for(let cx=11;cx<=18;cx++) m[cy][cx]=5;
    // Path from row 12 down to south border
    for(let y=12;y<TALL-2;y++){m[y][14]=4;m[y][15]=4;}
    // Door at row 11
    m[11][14]=11;m[11][15]=11;
    // South zone portal
    if(G.unlockedZones.has(2)){m[TALL-2][14]=6;m[TALL-2][15]=6;}
  } else if(z===2){
    for(let y=1;y<TALL-1;y++)for(let x=1;x<WIDE-1;x++)m[y][x]=0;
    [[3,3,8,6],[16,3,11,5],[2,12,10,8],[18,11,9,9],[8,7,14,8]].forEach(([sx,sy,w,h])=>{
      for(let y=sy;y<sy+h&&y<TALL-1;y++)for(let x=sx;x<sx+w&&x<WIDE-1;x++)m[y][x]=7;
    });
    [[1,1,2,4],[27,1,2,4],[1,20,2,5],[27,20,2,5]].forEach(([sx,sy,w,h])=>{
      for(let y=sy;y<sy+h&&y<TALL-1;y++)for(let x=sx;x<sx+w&&x<WIDE-1;x++)m[y][x]=2;
    });
    m[1][14]=6;m[1][15]=6;
    if(G.unlockedZones.has(3)){m[TALL-2][14]=6;m[TALL-2][15]=6;}
  } else if(z===3){
    [[2,2,12,8],[15,2,12,8],[2,14,12,8],[15,14,12,7],[7,8,16,8]].forEach(([sx,sy,w,h])=>{
      for(let y=sy;y<sy+h&&y<TALL-1;y++)for(let x=sx;x<sx+w&&x<WIDE-1;x++)m[y][x]=9;
    });
    [[1,1,2,5],[26,1,2,5],[1,20,2,5],[26,20,2,5]].forEach(([sx,sy,w,h])=>{
      for(let y=sy;y<sy+h&&y<TALL-1;y++)for(let x=sx;x<sx+w&&x<WIDE-1;x++)m[y][x]=2;
    });
    m[1][14]=6;m[1][15]=6;
  } else if(z==='pc'){
    // ── Pokemon Center Interior ──
    // 14 wide x 12 tall room, centered
    // All inner floor = tile 14 (light floor)
    // Walls = tile 2
    // Counter desk row = tile 15 (top half) at y=3, x=8..19
    // Exit door = tile 12 at bottom center
    const W2=20,H2=14,OX=5,OY=6;
    // Fill with floor
    for(let y=OY;y<OY+H2;y++)for(let x=OX;x<OX+W2;x++)m[y][x]=14;
    // Outer walls
    for(let x=OX;x<OX+W2;x++){m[OY][x]=2;m[OY+H2-1][x]=2;}
    for(let y=OY;y<OY+H2;y++){m[y][OX]=2;m[y][OX+W2-1]=2;}
    // Desk counter row (3 tiles wide, centered)
    const deskRow=OY+2;
    for(let x=OX+4;x<=OX+W2-5;x++)m[deskRow][x]=15;
    // Nurse Joy positions (decorative - just visible behind counter)
    // Exit at bottom center
    m[OY+H2-1][OX+W2/2|0]=12;
    m[OY+H2-1][(OX+W2/2|0)+1]=12;
    // Chairs/benches (tile 0 with decoration in drawTile)
    // Side decorations - potted plants (tile 2 small)
    m[OY+1][OX+1]=2;m[OY+1][OX+W2-2]=2;
    // Healing machine (tile 16) left of desk
    m[deskRow][OX+2]=16;m[deskRow][OX+3]=16;
    // PC terminals (tile 17) right of desk
    m[deskRow][OX+W2-4]=17;m[deskRow][OX+W2-3]=17;
    // Interact desk tiles (in front of counter, row deskRow+1)
    for(let x=OX+4;x<=OX+W2-5;x++)m[deskRow+1][x]=13;
  }
  return m;
}

function getMap(z){if(!MAPS[z])MAPS[z]=buildMap(z);return MAPS[z];}
function gt(z,tx,ty){
  if(tx<0||ty<0||tx>=WIDE||ty>=TALL)return 2;
  return getMap(z)[ty][tx];
}
function resetMap(z){delete MAPS[z];}
function walkable(t){return t!==2&&t!==3&&t!==5&&t!==15&&t!==16&&t!==17;}
function isEncounter(t){return t===1||t===7||t===9;}
function isWater(t){return t===7;}

// TILE DRAWING
// ═══════════════════════════════════════════════
function drawTile(tile,sx,sy,tx,ty){
  const z=G.zone;
  switch(tile){
    case 0:
      X.fillStyle=z==='pc'?'#c0c0b8':z===2?'#3878a8':z===3?'#281838':'#60a030';
      X.fillRect(sx,sy,TW,TW);break;
    case 1: { // GRASS - 3D blades with wind sway
      const gSway=Math.sin(G.tick*0.06+tx*0.4+ty*0.6)*1.4;
      const gSway2=Math.sin(G.tick*0.05+tx*0.7+ty*0.3)*1.2;
      X.fillStyle='#2a7010'; X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#3a8818'; X.fillRect(sx,sy+6,TW,TW-6);
      X.fillStyle='#1a5008'; X.fillRect(sx+2,sy+10,12,4);
      X.fillStyle='#289010';
      X.fillRect(sx+1+gSway,  sy+2, 3,12);
      X.fillRect(sx+7+gSway2, sy+0, 3,14);
      X.fillRect(sx+12+gSway, sy+3, 3,11);
      X.fillStyle='#70c840';
      X.fillRect(sx+1+gSway,  sy+2, 3,3);
      X.fillRect(sx+7+gSway2, sy+0, 3,3);
      X.fillRect(sx+12+gSway, sy+3, 3,3);
      X.fillStyle='#50a828';
      X.fillRect(sx+4+gSway2, sy+6, 2,8);
      X.fillRect(sx+9+gSway,  sy+7, 2,7);
      X.fillStyle='rgba(255,255,200,0.05)'; X.fillRect(sx,sy+14,TW,2);
      break;
    }
    case 2: { // wall/tree
      if(z===3){
        X.fillStyle='#180820';X.fillRect(sx,sy,TW,TW);
        X.fillStyle='#380848';X.fillRect(sx+1,sy+1,14,14);
        X.fillStyle='#501060';X.fillRect(sx+3,sy+1,10,6);
      } else if(z===2){
        X.fillStyle='#205838';X.fillRect(sx,sy,TW,TW);
        X.fillStyle='#2a7848';X.fillRect(sx+2,sy,12,10);
        X.fillStyle='#104028';X.fillRect(sx+4,sy+8,8,8);
      } else if(z==='pc'){
        // Lab wall - grey with white highlights
        X.fillStyle='#b0b0a8';X.fillRect(sx,sy,TW,TW);
        X.fillStyle='#c8c8c0';X.fillRect(sx+1,sy+1,14,14);
        X.fillStyle='#d8d8d0';X.fillRect(sx+1,sy+1,14,3); // light top
        // Lab tile seams
        X.fillStyle='#a0a098';X.fillRect(sx,sy,TW,1);X.fillRect(sx,sy,1,TW);
        // Equipment on walls (shelves with bug specimens)
        const isShelf=(ty===7)&&(tx>=6&&tx<=8||tx>=21&&tx<=23);
        if(isShelf){
          X.fillStyle='#8a7050';X.fillRect(sx,sy+6,TW,2); // shelf
          X.fillStyle='#d0c8b0';X.fillRect(sx+1,sy+7,TW-2,1);
          // Bug jars
          X.fillStyle='rgba(180,220,200,0.7)';X.fillRect(sx+2,sy+2,5,5);X.fillRect(sx+9,sy+2,5,5);
          X.fillStyle='#709080';X.fillRect(sx+2,sy+2,5,1);X.fillRect(sx+9,sy+2,5,1);
        }
      } else {
        // Zone 1 TREE - 3D layered canopy with wind sway
        const tSway=(Math.sin(G.tick*0.04+tx*0.5+ty*0.8)*1)|0;
        X.fillStyle='#50a028';X.fillRect(sx,sy,TW,TW); // green base, nothing bleeds through
        X.fillStyle='#3a1a08';X.fillRect(sx+6,sy+10,4,6); // trunk
        X.fillStyle='#6a3818';X.fillRect(sx+7,sy+10,3,6);
        X.fillStyle='rgba(0,0,0,0.18)';X.fillRect(sx+2,sy+14,12,2); // shadow
        X.fillStyle='#0e4806';X.fillRect(sx+2,sy+1,12,10); // dark back canopy
        X.fillStyle='#1a6010';X.fillRect(sx+0+tSway,sy+2,16,8); // mid
        X.fillStyle='#228018';X.fillRect(sx+2+tSway,sy+0,12,7);
        X.fillStyle='#2e9820';X.fillRect(sx+1+tSway,sy+4,14,7); // front
        X.fillStyle='#40a82a';X.fillRect(sx+3+tSway,sy+2,10,6);
        X.fillStyle='#60c838';X.fillRect(sx+5+tSway,sy+1,6,3); // highlights
        X.fillStyle='#78d84a';X.fillRect(sx+6+tSway,sy+0,4,2);
      }
      break;
    }
    case 4: // path
      X.fillStyle='#c8a060';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#b89050';X.fillRect(sx+1,sy+1,6,6);X.fillRect(sx+9,sy+9,6,6);break;
    case 5: // PC building exterior - red roof tiles
      X.fillStyle='#e8d0c0';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#c02828';X.fillRect(sx,sy,TW,5);
      X.fillStyle='#d83838';X.fillRect(sx+2,sy+1,12,3);
      X.fillStyle='#a8a0b8';X.fillRect(sx+4,sy+6,8,10);
      X.fillStyle='rgba(180,220,255,0.5)';X.fillRect(sx+5,sy+7,6,8);break;
    case 6: // zone portal
      X.fillStyle='#c89020';X.fillRect(sx,sy,TW,TW);
      {const pf=Math.sin(G.tick*.12)*3;
      X.fillStyle='#f8e050';X.fillRect(sx+2,sy+2+pf,12,12-Math.abs(pf)|0);
      X.fillStyle='rgba(255,240,100,0.5)';X.fillRect(sx+4,sy+4+pf,8,8-Math.abs(pf)|0);}break;
    case 7: // pond
      X.fillStyle='#1848a8';X.fillRect(sx,sy,TW,TW);
      {const rp=Math.sin(G.tick*.04+tx*.8+ty*.5)*1.5;
      X.fillStyle='rgba(80,160,255,0.35)';X.fillRect(sx+1,sy+4+rp,14,2);X.fillRect(sx+3,sy+10+rp,10,2);
      X.fillStyle='rgba(180,220,255,0.2)';X.fillRect(sx,sy+7,16,1);}break;
    case 9: // mushroom field
      X.fillStyle='#301828';X.fillRect(sx,sy,TW,TW);
      {const seed=(tx*31+ty*17)%8;
      const caps=['#e03020','#f8a000','#d060d0','#4080e0','#20c040','#e06020','#c030a0','#80d0a0'];
      const cap=caps[seed],ch=4+seed%3,ox2=sx+(seed%5)*2;
      X.fillStyle='#d8d0b8';X.fillRect(ox2+4,sy+ch+3,4,TW-ch-4);
      X.fillStyle=cap;X.fillRect(ox2+1,sy+3,12,ch);X.fillRect(ox2,sy+3+(ch/2)|0,14,(ch/2)|0);
      X.fillStyle='rgba(255,255,255,0.4)';X.fillRect(ox2+2,sy+3,4,2);}break;
    case 11: // PC door (exterior)
      X.fillStyle='#c8a060';X.fillRect(sx,sy,TW,TW); // path below door
      X.fillStyle='#c02828';X.fillRect(sx,sy,TW,4); // red roof overhang
      // Door frame
      X.fillStyle='#605040';X.fillRect(sx+2,sy+3,12,13);
      X.fillStyle='#c8a860';X.fillRect(sx+3,sy+4,10,12);
      // Glass panels
      X.fillStyle='rgba(160,200,240,0.7)';X.fillRect(sx+4,sy+5,4,10);X.fillRect(sx+9,sy+5,4,10);
      // Handle
      X.fillStyle='#f0c020';X.fillRect(sx+8,sy+10,2,2);
      // Sign
      X.fillStyle='#f0f0f0';X.fillRect(sx+4,sy-3,8,4);
      X.fillStyle='#c02828';X.fillRect(sx+5,sy-2,6,2);break;
    case 12: // PC exit (interior bottom)
      X.fillStyle='#d8c8a8';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#605040';X.fillRect(sx+2,sy,12,13);
      X.fillStyle='#c8a860';X.fillRect(sx+3,sy+1,10,12);
      X.fillStyle='rgba(160,200,240,0.7)';X.fillRect(sx+4,sy+2,4,10);X.fillRect(sx+9,sy+2,4,10);
      X.fillStyle='#f0c020';X.fillRect(sx+8,sy+7,2,2);break;
    case 13: // floor in front of counter (interact zone) - same as floor
    case 14: // Lab floor - white tiles with grey grout
      {const light=tx%2===ty%2;
      X.fillStyle=light?'#f0f0ec':'#e4e4e0';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#b0b0a8';X.fillRect(sx,sy,TW,1);X.fillRect(sx,sy,1,TW);}break;
    case 15: // Lab bench / desk - grey metal
      X.fillStyle='#909090';X.fillRect(sx,sy,TW,TW);   // bench body
      X.fillStyle='#b8b8b0';X.fillRect(sx,sy,TW,4);     // bench top surface
      X.fillStyle='#d0d0c8';X.fillRect(sx+1,sy+1,TW-2,2); // highlight
      X.fillStyle='#787878';X.fillRect(sx,sy+4,TW,2);   // shadow under lip
      X.fillStyle='#686868';X.fillRect(sx,sy+6,TW,10);  // front panel
      X.fillStyle='#808080';X.fillRect(sx+2,sy+8,12,6); // panel detail
      // Blue lab cross symbol
      X.fillStyle='#2060c8';X.fillRect(sx+7,sy+1,2,3);X.fillRect(sx+5,sy+2,6,1);break;
    case 16: // microscope on lab bench
      X.fillStyle='#484848';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#606060';X.fillRect(sx+4,sy+1,8,12); // arm
      X.fillStyle='#808080';X.fillRect(sx+3,sy+12,10,3); // base
      X.fillStyle='#a0a0a0';X.fillRect(sx+4,sy+13,8,2);
      X.fillStyle='#c8d8e8';X.fillRect(sx+5,sy+3,6,5); // lens
      X.fillStyle='rgba(180,220,255,0.6)';X.fillRect(sx+6,sy+4,4,3);
      X.fillStyle='#303030';X.fillRect(sx+6,sy+1,4,3); // eyepiece
      break;
    case 17: // computer terminal / lab PC
      X.fillStyle='#1a2838';X.fillRect(sx,sy,TW,TW);
      X.fillStyle='#0a1828';X.fillRect(sx+2,sy+1,12,10);
      X.fillStyle='#1a60c8';X.fillRect(sx+3,sy+2,10,8); // blue screen
      X.fillStyle='rgba(255,255,255,0.5)';X.fillRect(sx+4,sy+3,4,2);
      X.fillStyle='#00cc44';X.fillRect(sx+3+((G.tick>>3)%9),sy+6,2,1);
      X.fillStyle='#c8c0b0';X.fillRect(sx+2,sy+12,12,3);
      X.fillStyle='#a0a098';X.fillRect(sx+3,sy+13,10,1);break;
  }
}

const ZN={1:'MOSSY WOODS',2:'MURKY POND',3:'MUSHROOM HOLLOW',pc:'ENTOMOLOGY DEPT'};

function drawWorld(){
  const p=G.player,map=getMap(G.zone);
  if(!p.visX) p.visX=p.x;
  if(!p.visY) p.visY=p.y;
  const camX=p.visX-240+8,camY=p.visY-216+8;

  // Movement
  if(G.moveDelay>0){G.moveDelay--;}
  else{
    let dx=0,dy=0;
    if(G.keys['ArrowUp']   ||G.keys['w']||G.keys['W']){dy=-1;p.dir=0;}
    else if(G.keys['ArrowDown'] ||G.keys['s']||G.keys['S']){dy=1;p.dir=2;}
    else if(G.keys['ArrowLeft'] ||G.keys['a']||G.keys['A']){dx=-1;p.dir=3;}
    else if(G.keys['ArrowRight']||G.keys['d']||G.keys['D']){dx=1;p.dir=1;}
    if(dx||dy){
      const nx=p.x+dx*TW,ny=p.y+dy*TW;
      const tx=Math.round(nx/TW),ty=Math.round(ny/TW);
      const tile=gt(G.zone,tx,ty);
      if(walkable(tile)){
        p.x=nx;p.y=ny;G.moveDelay=8;
        if(isEncounter(tile)&&Math.random()<.13)triggerEnc();
        if(tile===6)doPortal(tx,ty);
        if(tile===11)enterPC();      // walk into PC door
        if(tile===12)exitPC();       // walk out of PC
        if(tile===13)tryTalkDesk();  // interact tile in front of desk
      }
    }
  }

  // Smooth visual position - lerp toward actual tile position
  p.visX+=(p.x-p.visX)*0.35;
  p.visY+=(p.y-p.visY)*0.35;
  // Snap when very close
  if(Math.abs(p.visX-p.x)<0.5) p.visX=p.x;
  if(Math.abs(p.visY-p.y)<0.5) p.visY=p.y;
  // Tick walk frame continuously while moving
  if(Math.abs(p.visX-p.x)>1||Math.abs(p.visY-p.y)>1) p.frame++;

  const curTile=gt(G.zone,Math.round(p.x/TW),Math.round(p.y/TW));
  const inWater=isWater(curTile);

  // Background
  if(G.zone==='pc'){
    X.fillStyle='#c8c8c0';X.fillRect(0,0,480,432); // lab grey
  } else if(G.zone===1){
    X.fillStyle='#50a028';X.fillRect(0,0,480,432);
  } else if(G.zone===2){
    X.fillStyle='#4888b8';X.fillRect(0,0,480,432);
  } else {
    X.fillStyle='#180828';X.fillRect(0,0,480,432);
  }

  // Tiles
  for(let ty=0;ty<TALL;ty++)for(let tx=0;tx<WIDE;tx++){
    const tile=map[ty][tx];
    const sx=tx*TW-camX,sy=ty*TW-camY;
    if(sx<-TW||sx>496||sy<-TW||sy>448)continue;
    drawTile(tile,sx,sy,tx,ty);
  }

  // Draw Dr. Marshall behind the lab desk (same scale as player sprite)
  if(G.zone==='pc'){
    const drX=15*TW-camX, drY=8*TW-camY;
    drawDrMarshallSmall(X,drX,drY);
  }

  drawPlayer(X,p.visX-camX,p.visY-camY,p.dir,p.frame,inWater);

  // Hints - shown above bottom-left HUD, right-justified to avoid overlap
  const ptx=Math.round(p.x/TW),pty=Math.round(p.y/TW);
  if(G.zone===1){
    const nearDoor=Math.abs(ptx-14)<=2&&pty>=10&&pty<=13;
    if(nearDoor){panel(160,390,316,28);T('Walk north into the door',318,404,6,'#303848','right');}
  }
  if(G.zone==='pc'){
    const nearExit=pty>=18&&Math.abs(ptx-15)<=2;
    if(nearExit){panel(160,390,316,28);T('Walk south to exit',318,404,6,'#303848','right');}
  }

  // PC message
  if(G.pcMsgTimer>0){
    G.pcMsgTimer--;
    panel(40,160,400,90,'#f8f8e8');
    G.pcMsg.split('\n').forEach((l,i)=>T(l,60,190+i*22,7,'#303848'));
  }

  drawWorldHUD();
  BTN(348,4,128,26,'MENU',()=>G.screen='menu');
}

function enterPC(){
  G.prevZone=G.zone;
  G.zone='pc'; resetMap('pc');
  G.player.x=15*TW; G.player.y=18*TW; G.player.dir=0;
  G.player.visX=G.player.x; G.player.visY=G.player.y;
  G.moveDelay=20;
}

function exitPC(){
  G.zone=G.prevZone||1;
  G.player.x=14*TW; G.player.y=13*TW; G.player.dir=2;
  G.player.visX=G.player.x; G.player.visY=G.player.y;
  G.moveDelay=20;
}

function tryTalkDesk(){
  // Heal all bugs in loadout to full HP
  if(!G.bugHP) G.bugHP={};
  G.loadout.forEach(id=>{G.bugHP[id]=BUGS[id].hp;});
  G.battleParty=buildBattleParty();
  G.pcMsg='Dr. Marshall:\nAll your bugs have been\nfully restored!';
  G.pcMsgTimer=180;
}

function triggerEnc(){
  const pool=Object.keys(BUGS).filter(id=>BUGS[id].zone===G.zone&&!BUGS[id].starter);
  const ids2=pool.length?pool:Object.keys(BUGS).filter(id=>BUGS[id].zone===G.zone);
  const wid=ids2[Math.floor(Math.random()*ids2.length)];
  G.battle={wild:makeBug(wid)};
  G.battleParty=buildBattleParty();
  if(!G.battleParty.length){G.battle=null;return;}
  G.battleMsg=`A wild ${BUGS[wid].name}\nappeared!`;
  G.battlePhase='action';G.pendingAction=null;
  G.btFlashP=0;G.btFlashE=0;G.btTick=0;G.swapMode=false;
  G.screen='battle';
}

function doPortal(tx,ty){
  const p=G.player;
  if(G.zone===1&&ty===TALL-2){G.zone=2;p.x=14*TW;p.y=(TALL-3)*TW;resetMap(2);}
  else if(G.zone===2&&ty===1){G.zone=1;p.x=14*TW;p.y=(TALL-3)*TW;resetMap(1);}
  else if(G.zone===2&&ty===TALL-2){G.zone=3;p.x=14*TW;p.y=(TALL-3)*TW;resetMap(3);}
  else if(G.zone===3&&ty===1){G.zone=2;p.x=14*TW;p.y=(TALL-3)*TW;resetMap(2);}
  p.visX=p.x; p.visY=p.y;
}

    // Measure approximate text widths to size panel dynamically

  }
}

  // Wild bug — sits on its platform
  if(G.btFlashE>0){X.globalAlpha=.3+.7*Math.abs(Math.sin(G.btTick*.35));G.btFlashE--;}

function startSwap(){if(G.battleParty.filter(b=>b.hp>0).length<=1){G.battleMsg='No other bugs\nto swap to!';return;}G.swapMode=true;}
function drawSwapMenu(){

  G.battleParty.slice(0,6).forEach((bug,i)=>{const bx=4+(i%3)*158,by=380;const isA=i===0,fd=bug.hp<=0;BTN(bx,by,150,26,`${dn(bug)} ${bug.hp}/${bug.maxHp}`,(isA||fd)?null:()=>swapBug(i),isA,fd);});
  BTN(4,406,100,22,'← BACK',()=>G.swapMode=false);
}
function swapBug(idx){const bp=G.battleParty,t=bp.splice(idx,1)[0];bp.unshift(t);G.swapMode=false;G.battlePhase='action';G.battleMsg=`Go, ${dn(t)}!`;}
function autoSwap(){const idx=G.battleParty.findIndex((b,i)=>i>0&&b.hp>0);if(idx===-1)return false;const t=G.battleParty.splice(idx,1)[0];G.battleParty.unshift(t);G.battleMsg=`${dn(G.battleParty[1]||G.battleParty[0])} fainted!\nGo, ${dn(t)}!`;return true;}
function calcDmg(baseDmg,isCrit){
  // Each move has a fixed base damage (7-12 range), plus crit
  const roll=baseDmg+Math.floor(Math.random()*4)-1; // ±1-2 variance
  if(isCrit) return Math.floor(roll*1.5);
  return roll;
}
function doMove(mv){
  const me=G.battleParty[0],wild=G.battle.wild,m=MOVES[mv];
  G.battlePhase='result';let msg='';
  if(m&&m.p>0){
    if(Math.random()<m.a){
      const crit=Math.random()<0.1;
      const dmg=calcDmg(m.p,crit);
      wild.hp=Math.max(0,wild.hp-dmg);G.btFlashE=20;
      msg=`${dn(me)} used ${mv}!`+(crit?'\nCritical hit! ':'\n')+`Dealt ${dmg} damage!`;
    } else msg=`${dn(me)} used ${mv}!\nBut it missed!`;
  } else if(m){
    if(m.e==='def+'){me.db=(me.db||0)+1;msg=`${dn(me)}'s DEF rose!`;}
    else if(m.e==='spd+'){me.sb=(me.sb||0)+1;msg=`${dn(me)}'s SPD rose!`;}
    else if(m.e==='evade'){me.ev=(me.ev||0)+1;msg=`${dn(me)} got evasive!`;}
    else msg=`${dn(me)} used ${mv}!`;
  }
  if(wild.hp<=0){G.battleMsg=msg+`\n${dn(wild)} fainted!`;G.pendingAction='win';return;}
  const em=wild.moves[Math.floor(Math.random()*wild.moves.length)],emv=MOVES[em];
  let emsg='';
  if(emv&&emv.p>0){
    if(Math.random()<emv.a){
      const ecrit=Math.random()<0.1;
      const edmg=calcDmg(emv.p,ecrit);
      me.hp=Math.max(0,me.hp-edmg);G.btFlashP=20;
      emsg=`${dn(wild)} used ${em}!`+(ecrit?'\nCritical hit! ':'\n')+`Hit for ${edmg}!`;
    } else emsg=`${dn(wild)} used ${em}!\nMissed!`;
  } else emsg=`${dn(wild)} used ${em}!`;
  G.battleMsg=msg+'\n'+emsg;
  G.pendingAction=me.hp<=0?(G.battleParty.some((b,i)=>i>0&&b.hp>0)?'autoswap':'lose'):'continue';
}
function afterResult(){
  if(G.pendingAction==='win'){G.battlePhase='over';G.battleMsg='You won!';return;}
  if(G.pendingAction==='autoswap'){autoSwap();G.battlePhase='result';G.pendingAction='continue';return;}
  if(G.pendingAction==='lose'){
    // Bug fainted - no auto-heal. Just end the battle.
    G.battlePhase='over';G.battleMsg=`${dn(G.battleParty[0])} fainted!\nHead to the Pokemon\nCenter to heal.`;
    return;
  }
  if(G.pendingAction==='caught'){G.battlePhase='over';G.battleMsg='Bug added to Bugdex!';return;}
  G.battlePhase='action';G.battleMsg='What will you do?';
}
function doNet(){
  const wild=G.battle.wild,pct=wild.hp/wild.maxHp;
  const rate=pct<.25?.90:pct<.5?.60:pct<.75?.28:.07;
  G.battlePhase='result';
  if(Math.random()<rate){
    G.pendingAction='caught';
    const bugName=BUGS[wild.id]?BUGS[wild.id].name:wild.id;
    G.battleMsg=`Gotcha!\n${bugName} was caught!`;
    G.naming=true;G.nameTarget={id:wild.id,capturedHp:wild.hp};G.nameStr='';
  } else {
    const edmg=calcDmg(8,false);
    G.battleParty[0].hp=Math.max(0,G.battleParty[0].hp-edmg);G.btFlashP=20;
    G.battleMsg=`${BUGS[wild.id].name} broke free!\nHit back for ${edmg}!`;
    G.pendingAction=G.battleParty[0].hp<=0?(G.battleParty.some((b,i)=>i>0&&b.hp>0)?'autoswap':'lose'):'continue';
  }
}
function doRun(){G.battlePhase='over';G.battleMsg='Got away safely!';}
function endBattle(){saveBattleHP();if(G.naming){G.screen='naming';return;}G.screen='world';checkUnlocks();}
function checkUnlocks(){
  const z=typeof G.zone==='number'?G.zone:G.prevZone||1;
  if(z===1&&G.zoneCaught[1]>=3&&!G.unlockedZones.has(2)){G.unlockedZones.add(2);resetMap(1);G.unlockMsg='3 bugs caught!\nMURKY POND unlocked.\nHead south!';G.screen='unlock';}
  else if(z===2&&G.zoneCaught[2]>=3&&!G.unlockedZones.has(3)){G.unlockedZones.add(3);resetMap(2);G.unlockMsg='3 pond bugs caught!\nMUSHROOM HOLLOW unlocked!\nHead south!';G.screen='unlock';}
}

document.addEventListener('keydown',e=>{
  G.keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  if(e.key==='Enter'&&G.screen==='title'){G.screen='intro';G.introIdx=0;G.introCharIdx=0;G.introTimer=0;G.introPhase=0;}
  if(e.key==='Enter'&&G.screen==='world')G.screen='menu';
  if(e.key==='Enter'&&G.screen==='intro')advanceIntro();
  // B = back in battle move screen
  if((e.key==='b'||e.key==='B')&&G.screen==='battle'&&G.battlePhase==='move'){G.battlePhase='action';}
  if((e.key==='b'||e.key==='B')&&G.screen==='battle'&&G.swapMode){G.swapMode=false;}
  if((e.key==='z'||e.key==='Z')&&G.screen==='world'){
    // Z = interact
    const p=G.player,tx=Math.round(p.x/TW),ty=Math.round(p.y/TW);
    const dirs=[[0,-1],[1,0],[0,1],[-1,0]];const[ddx,ddy]=dirs[p.dir]||[0,1];
    const ftile=gt(G.zone,tx+ddx,ty+ddy);
    if(ftile===11)enterPC();
    if(ftile===12)exitPC();
    if(ftile===13)tryTalkDesk();
  }
  if(G.screen==='naming'){
    if(e.key==='Backspace')G.nameStr=G.nameStr.slice(0,-1);
    else if(e.key==='Enter')confirmName();
    else if(e.key.length===1&&G.nameStr.length<12)G.nameStr+=e.key.toUpperCase();
  }
});
document.addEventListener('keyup',e=>{delete G.keys[e.key];});

function canvasPos(e){
  const r=C.getBoundingClientRect(),sx=GAME_W/r.width,sy=GAME_H/r.height;
  const src=e.touches?e.touches[0]:(e.changedTouches?e.changedTouches[0]:e);
  return{x:(src.clientX-r.left)*sx,y:(src.clientY-r.top)*sy};
}
C.addEventListener('mousemove',e=>{
  const{x,y}=canvasPos(e);
  const h=G.buttons.find(b=>x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h);
  G.hovered=h?h.label:null;C.style.cursor=h?'pointer':'default';
});
C.addEventListener('click',e=>{
  const{x,y}=canvasPos(e);
  const h=G.buttons.find(b=>x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h);
  if(h&&h.action)h.action();
});
C.addEventListener('touchstart',e=>{

  const{x,y}=canvasPos(e);

// ON-SCREEN CONTROLLER
// ═══════════════════════════════════════════════
// D-pad
function dpPress(key,el){
  G.keys[key]=true;
  el.classList.add('pressed');
}
function dpRelease(key,el){
  delete G.keys[key];
  el.classList.remove('pressed');
}

function setupDpad(id,key){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();dpPress(key,el);},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();dpRelease(key,el);},{passive:false});
  el.addEventListener('touchcancel',e=>{dpRelease(key,el);});
  // Mouse fallback
  el.addEventListener('mousedown',()=>dpPress(key,el));
  el.addEventListener('mouseup',  ()=>dpRelease(key,el));
  el.addEventListener('mouseleave',()=>dpRelease(key,el));
}
setupDpad('dp-up','ArrowUp');
setupDpad('dp-down','ArrowDown');
setupDpad('dp-left','ArrowLeft');
setupDpad('dp-right','ArrowRight');

// A button = Enter/Z (confirm / interact)
function setupBtn(id,fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();el.classList.add('pressed');fn();},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();el.classList.remove('pressed');},{passive:false});
  el.addEventListener('click',fn);
}
setupBtn('btn-a',()=>{
  if(G.screen==='intro'){advanceIntro();return;}
  if(G.screen==='world'){
    const p=G.player,tx=Math.round(p.x/TW),ty=Math.round(p.y/TW);
    const dirs=[[0,-1],[1,0],[0,1],[-1,0]];const[ddx,ddy]=dirs[p.dir]||[0,1];
    const ftile=gt(G.zone,tx+ddx,ty+ddy);
    if(ftile===11){enterPC();return;}
    if(ftile===12){exitPC();return;}
    if(ftile===13){tryTalkDesk();return;}
  }
});
setupBtn('btn-b',()=>{
  if(G.screen==='battle'&&G.battlePhase==='move')G.battlePhase='action';
  if(G.screen==='battle'&&G.swapMode)G.swapMode=false;
  if(G.screen==='bugdex'||G.screen==='loadout')G.screen='menu';
  if(G.screen==='menu')G.screen='world';
});
setupBtn('btn-menu',()=>{
  if(G.screen==='world')G.screen='menu';
  else if(G.screen==='menu')G.screen='world';
});
setupBtn('btn-start',()=>{
  if(G.screen==='title'){G.screen='intro';G.introIdx=0;G.introCharIdx=0;G.introTimer=0;G.introPhase=0;}
});
</script>
